name: Build And Deploy Pages

on:
  push:
    paths:
      - "shared/**"
      - "public-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
    inputs:
      use_prebuilt_site:
        description: "Deploy checked-in public-site/runtime artifacts without rerunning the pipeline"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "7 0 * * *"
    - cron: "7 6 * * *"
    - cron: "7 12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUTF8: "1"
      TZ: Asia/Seoul
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./shared
          python -m pip install -e ./public-site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve deploy mode
        id: deploy_mode
        shell: bash
        run: |
          use_prebuilt_site=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.use_prebuilt_site }}" == "true" ]]; then
            use_prebuilt_site=true
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.head_commit.message }}" == *"[deploy-prebuilt]"* ]]; then
            use_prebuilt_site=true
          fi
          echo "use_prebuilt_site=$use_prebuilt_site" >> "$GITHUB_OUTPUT"

      - name: Run pipeline
        if: ${{ steps.deploy_mode.outputs.use_prebuilt_site != 'true' }}
        run: python public-site/scripts/cron_runner.py

      - name: Verify generated artifacts
        run: python public-site/scripts/verify_site_artifacts.py --min-articles 1 --min-news-cards 0

      - name: Prepare Pages artifact
        env:
          PAGES_CNAME: ${{ vars.PAGES_CNAME }}
        run: python public-site/scripts/prepare_pages_site.py --site-dir public-site/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
