<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">청년 모아봄 홈 일러스트</title>
  <desc id="desc">여러 기사와 정책 카드가 해가 비추는 파란 모음함 안으로 모이는 일러스트</desc>
  <defs>
    <style>
      .navy { fill: #102747; }
      .blue { fill: #3278BD; }
      .blue-dark { fill: #2268AD; }
      .sun { fill: #FB7435; }
      .sun-ray { fill: none; stroke: #FB7435; stroke-width: 8; stroke-linecap: round; }
      .paper { fill: #FFFDF9; }
      .paper-blue { fill: #F7FBFF; stroke: #8FB7DF; stroke-width: 4; }
      .paper-warm { fill: #FFF3E7; stroke: #F0D8C4; stroke-width: 4; }
      .paper-main { fill: #FFFDF9; stroke: #102747; stroke-width: 5; }
      .line-soft { fill: #D9DDE2; }
      .label {
        fill: #FFFFFF;
        font-family: "Noto Sans KR", "Pretendard", "Apple SD Gothic Neo", sans-serif;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .chip {
        fill: #FFF8F1;
        stroke: #F0D8C4;
        stroke-width: 2;
      }
      .chip-text {
        fill: #102747;
        font-family: "Noto Sans KR", "Pretendard", "Apple SD Gothic Neo", sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <ellipse cx="160" cy="219" rx="104" ry="13" fill="#0B1828" opacity=".24"/>

  <g aria-hidden="true">
    <line class="sun-ray" x1="223" y1="22" x2="223" y2="36"/>
    <line class="sun-ray" x1="223" y1="22" x2="223" y2="36" transform="rotate(-45 223 67)"/>
    <line class="sun-ray" x1="223" y1="22" x2="223" y2="36" transform="rotate(45 223 67)"/>
    <line class="sun-ray" x1="223" y1="22" x2="223" y2="36" transform="rotate(-90 223 67)"/>
    <line class="sun-ray" x1="223" y1="22" x2="223" y2="36" transform="rotate(90 223 67)"/>
  </g>
  <circle class="sun" cx="223" cy="67" r="33"/>

  <rect class="chip" x="53" y="42" width="62" height="30" rx="15"/>
  <text class="chip-text" x="84" y="61" text-anchor="middle">뉴스</text>
  <rect class="chip" x="35" y="95" width="67" height="30" rx="15"/>
  <text class="chip-text" x="68.5" y="114" text-anchor="middle">정책</text>
  <rect class="chip" x="224" y="101" width="72" height="30" rx="15"/>
  <text class="chip-text" x="260" y="120" text-anchor="middle">참여</text>

  <g opacity=".96" transform="rotate(-9 103 117)">
    <rect class="paper-blue" x="72" y="77" width="58" height="82" rx="15"/>
    <rect class="blue" x="89" y="96" width="16" height="18" rx="4"/>
    <rect class="navy" x="111" y="99" width="28" height="7" rx="3.5"/>
    <rect class="line-soft" x="89" y="123" width="47" height="6" rx="3"/>
    <rect class="line-soft" x="89" y="139" width="35" height="6" rx="3"/>
  </g>

  <g opacity=".96" transform="rotate(9 215 119)">
    <rect class="paper-warm" x="190" y="79" width="58" height="82" rx="15"/>
    <rect class="sun" x="207" y="98" width="16" height="18" rx="4"/>
    <rect class="navy" x="229" y="101" width="28" height="7" rx="3.5"/>
    <rect class="line-soft" x="207" y="125" width="47" height="6" rx="3"/>
    <rect class="line-soft" x="207" y="141" width="35" height="6" rx="3"/>
  </g>

  <rect class="paper-main" x="126" y="62" width="68" height="100" rx="17"/>
  <rect class="sun" x="144" y="86" width="18" height="20" rx="4"/>
  <rect class="navy" x="169" y="90" width="30" height="8" rx="4"/>
  <rect class="line-soft" x="144" y="119" width="53" height="7" rx="3.5"/>
  <rect class="line-soft" x="144" y="137" width="41" height="7" rx="3.5"/>

  <path class="blue-dark" d="M63 151h194l-17 32H80L63 151Z"/>
  <path class="blue" d="M73 160h174l-17 50c-2.4 7.2-8.3 11-16 11H106c-7.7 0-13.6-3.8-16-11L73 160Z"/>
  <rect class="paper" x="123" y="195" width="74" height="8" rx="4" opacity=".95"/>
  <text class="label" x="160" y="184" text-anchor="middle">모아봄</text>
