<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-labelledby="title desc">
  <title id="title">청년 모아봄 뉴스 꽃 심볼</title>
  <desc id="desc">봄꽃 안에 오늘의 정보 카드가 놓인 청년 모아봄 로고</desc>
  <defs>
    <linearGradient id="petalGold" x1="45" y1="16" x2="116" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffef7"/>
      <stop offset="0.6" stop-color="#fff3cf"/>
      <stop offset="1" stop-color="#e7bd52"/>
    </linearGradient>
    <linearGradient id="petalCream" x1="46" y1="20" x2="112" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffef9"/>
      <stop offset="0.72" stop-color="#fff8dc"/>
      <stop offset="1" stop-color="#f0d789"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="42" y1="116" x2="118" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8ecd4"/>
      <stop offset="1" stop-color="#90c7a0"/>
    </linearGradient>
    <style>
      .bg { fill: #fffaf0; }
      .bg-line { fill: none; stroke: #ebddad; stroke-width: 3; }
      .petal { stroke: #735b12; stroke-width: 2.5; }
      .petal-a { fill: url(#petalGold); }
      .petal-b { fill: url(#petalCream); }
      .leaf { fill: url(#leafGradient); }
      .stem { fill: none; stroke: #90c7a0; stroke-width: 5; stroke-linecap: round; }
      .card { fill: #fffef9; stroke: #263238; stroke-width: 4.5; }
      .card-top { fill: #e7bd52; }
      .line { fill: #69757c; opacity: .76; }
      .line-soft { fill: #e7ddc8; }
      .dot { fill: #90c7a0; }
    </style>
  </defs>

  <circle class="bg" cx="80" cy="78" r="61"/>
  <circle class="bg-line" cx="80" cy="78" r="61"/>

  <g aria-hidden="true" transform="translate(80 76)">
    <rect class="petal petal-a" x="-15" y="-58" width="30" height="52" rx="12"/>
    <rect class="petal petal-b" x="-15" y="-58" width="30" height="52" rx="12" transform="rotate(72)"/>
    <rect class="petal petal-a" x="-15" y="-58" width="30" height="52" rx="12" transform="rotate(144)"/>
    <rect class="petal petal-b" x="-15" y="-58" width="30" height="52" rx="12" transform="rotate(216)"/>
    <rect class="petal petal-a" x="-15" y="-58" width="30" height="52" rx="12" transform="rotate(288)"/>
  </g>

  <path class="stem" d="M80 101c-1 11-6 22-15 32"/>
  <path class="leaf" d="M34 128c15-10 31-12 47-6-9 14-22 20-38 18-5-.7-8-5-9-12Z"/>
  <path class="leaf" d="M126 128c-15-10-31-12-47-6 9 14 22 20 38 18 5-.7 8-5 9-12Z"/>

  <rect class="card" x="48" y="55" width="64" height="58" rx="16"/>
  <rect class="card-top" x="63" y="69" width="34" height="9" rx="4.5"/>
  <rect class="line" x="61" y="86" width="38" height="6" rx="3"/>
  <rect class="line-soft" x="67" y="99" width="26" height="6" rx="3"/>
  <circle class="dot" cx="103" cy="99" r="4"/>
</svg>
