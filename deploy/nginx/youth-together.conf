server {
    listen 80;
    server_name _;

    root /opt/youth-together/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /pipeline-status.json {
        alias /opt/youth-together/output/pipeline_status.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location = /step5-summarized.json {
        alias /opt/youth-together/output/step5_summarized.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }
}
